<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Capital Lab — Propuestas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --text: #111111;
    --text-secondary: #666666;
    --accent: #006682;
    --accent-orange: #F25917;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "JetBrains Mono", monospace;
    background: var(--bg);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .container {
    text-align: center;
    padding: 40px;
  }
  .logo { height: 48px; margin-bottom: 32px; opacity: 0.8; }
  h1 {
    font-size: 28px;
    font-weight: 300;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
  }
  h1 strong { font-weight: 600; color: var(--accent); }
  p {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.6;
  }
  .bar {
    width: 60px;
    height: 3px;
    background: var(--accent-orange);
    margin: 24px auto 0;
    border-radius: 2px;
  }
</style>
</head>
<body>
<div class="container">
  <h1><strong>Capital Lab</strong></h1>
  <p>Informacion Inteligente</p>
  <div class="bar"></div>
  <p style="margin-top: 24px; font-size: 12px; color: #999;">propuestas.caplab.com.co</p>
</div>
</body>
</html>
