<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>{{TITULO}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --surface: #f5f5f5;
    --text: #111111;
    --text-secondary: #666666;
    --text-muted: #999999;
    --accent: #006682;
    --accent-light: rgba(0,102,130,0.08);
    --accent-orange: #F25917;
    --border: #e0e0e0;
    --radius: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "JetBrains Mono", monospace;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    line-height: 1.6;
  }

  /* --- Layout --- */
  .page {
    max-width: 860px;
    margin: 0 auto;
    padding: 60px 40px 80px;
  }

  /* --- Header --- */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 32px;
    border-bottom: 2px solid var(--border);
    margin-bottom: 48px;
  }
  .header-logo { height: 32px; }
  .header-meta {
    text-align: right;
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.8;
  }

  /* --- Hero --- */
  .hero {
    margin-bottom: 56px;
    padding-bottom: 40px;
    border-bottom: 1px solid var(--border);
  }
  .hero .label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--accent);
    margin-bottom: 12px;
  }
  .hero h1 {
    font-size: clamp(28px, 4vw, 42px);
    font-weight: 300;
    letter-spacing: -0.02em;
    line-height: 1.15;
    margin-bottom: 16px;
  }
  .hero h1 strong { font-weight: 600; }
  .hero .subtitle {
    font-size: 15px;
    color: var(--text-secondary);
    max-width: 600px;
  }

  /* --- Sections --- */
  .section {
    margin-bottom: 48px;
  }
  .section-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--accent);
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 2px solid var(--accent);
    display: inline-block;
  }
  .section h2 {
    font-size: clamp(20px, 3vw, 28px);
    font-weight: 300;
    letter-spacing: -0.01em;
    margin-bottom: 16px;
  }
  .section h2 strong { font-weight: 600; color: var(--accent); }
  .section p {
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 12px;
    max-width: 700px;
  }

  /* --- Cards --- */
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 20px;
    margin-top: 20px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    transition: border-color 0.3s ease;
  }
  .card:hover { border-color: var(--text-muted); }
  .card-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .card-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
  .card-text { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }

  /* --- List items --- */
  .item-list { list-style: none; padding: 0; }
  .item-list li {
    font-size: 14px;
    color: var(--text-secondary);
    padding: 10px 0 10px 24px;
    position: relative;
    border-bottom: 1px solid var(--border);
    line-height: 1.5;
  }
  .item-list li::before {
    content: "\2192";
    position: absolute;
    left: 0;
    color: var(--accent);
  }
  .item-list li:last-child { border-bottom: none; }

  /* --- Checklist --- */
  .checklist { list-style: none; padding: 0; }
  .checklist li {
    font-size: 14px;
    color: var(--text-secondary);
    padding: 8px 0 8px 28px;
    position: relative;
    line-height: 1.5;
  }
  .checklist li::before {
    content: "\2713";
    position: absolute;
    left: 0;
    color: var(--accent);
    font-weight: 700;
    font-size: 15px;
  }

  /* --- Timeline / Phases --- */
  .phases {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 24px;
    margin-top: 20px;
  }
  .phase {
    position: relative;
    padding-left: 20px;
    border-left: 3px solid var(--accent);
  }
  .phase-number {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .phase-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
  .phase-text { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
  .phase-time {
    font-size: 11px;
    color: var(--accent-orange);
    font-weight: 600;
    margin-top: 8px;
  }

  /* --- Table --- */
  .invest-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 16px;
    font-size: 14px;
  }
  .invest-table th {
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    padding: 12px 16px;
    border-bottom: 2px solid var(--accent);
  }
  .invest-table td {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    color: var(--text-secondary);
  }
  .invest-table tr:last-child td {
    border-bottom: 2px solid var(--text);
    font-weight: 600;
    color: var(--text);
  }
  .invest-table .amount {
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  /* --- Note / Highlight --- */
  .note {
    margin-top: 20px;
    padding: 16px 20px;
    background: var(--accent-light);
    border-left: 3px solid var(--accent);
    border-radius: 0 var(--radius) var(--radius) 0;
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.6;
  }
  .note strong { color: var(--text); }

  /* --- CTA / Contact --- */
  .cta {
    margin-top: 56px;
    padding: 40px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    text-align: center;
  }
  .cta h2 {
    font-size: 24px;
    font-weight: 300;
    margin-bottom: 8px;
  }
  .cta h2 strong { font-weight: 600; color: var(--accent); }
  .cta p {
    font-size: 14px;
    color: var(--text-secondary);
    margin: 0 auto 20px;
    max-width: 500px;
  }
  .cta-contact {
    font-size: 14px;
    line-height: 2;
    color: var(--text-secondary);
  }
  .cta-contact strong { color: var(--text); }
  .cta-contact a {
    color: var(--accent);
    text-decoration: none;
  }
  .cta-contact a:hover { text-decoration: underline; }

  /* --- Footer --- */
  .footer {
    margin-top: 56px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .footer-logo { height: 24px; opacity: 0.5; }
  .footer-text {
    font-size: 11px;
    color: var(--text-muted);
  }

  /* --- Two columns --- */
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
    margin-top: 20px;
  }

  /* --- Responsive --- */
  @media (max-width: 768px) {
    .page { padding: 32px 24px 60px; }
    .header { flex-direction: column; gap: 16px; text-align: center; }
    .header-meta { text-align: center; }
    .two-col { grid-template-columns: 1fr; }
    .phases { grid-template-columns: 1fr; }
    .cards { grid-template-columns: 1fr; }
  }

  /* --- Print --- */
  @media print {
    body { font-size: 12px; }
    .page { max-width: 100%; padding: 20px; }
    .card, .cta { break-inside: avoid; }
    .section { break-inside: avoid; }
    .note { background: #f0f0f0 !important; }
  }
</style>
</head>
<body>

<div class="page">

  <!-- Header -->
  <div class="header">
    <img src="{{LOGO_HORIZONTAL}}" alt="Capital Lab" class="header-logo">
    <div class="header-meta">
      {{FECHA}}<br>
      {{REFERENCIA}}
    </div>
  </div>

  <!-- Hero -->
  <div class="hero">
    <div class="label">Propuesta comercial</div>
    <h1>{{TITULO_HERO}}</h1>
    <p class="subtitle">{{SUBTITULO}}</p>

  <!-- Sections: injected by gen_propuesta.py -->
  {{SECCIONES}}

  <!-- CTA -->
  <div class="cta">
    <h2>{{CTA_TITULO}}</h2>
    <p>{{CTA_TEXTO}}</p>
    <div class="cta-contact">
      <strong>Andres Cano</strong> — CEO<br>
      <a href="mailto:andrescano@caplab.com.co">andrescano@caplab.com.co</a><br>
      <a href="https://www.caplab.com.co" target="_blank">www.caplab.com.co</a>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <img src="{{LOGO_CIRCLE}}" alt="Capital Lab" class="footer-logo">
    <div class="footer-text">Capital Lab S.A.S. — Informacion Inteligente</div>
  </div>

</div>

</body>
</html>
